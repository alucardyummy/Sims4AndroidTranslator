- name: Clean caches
  run: |
    rm -rf .buildozer
    rm -rf ~/.buildozer
    rm -rf ~/.gradle/caches

name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Clean caches
       run: |
    rm -rf .buildozer
    rm -rf ~/.buildozer

      - name: Dependencias
       run: |
    sudo apt-get update -qq
    sudo apt-get install -y git zip unzip \
      libffi-dev libssl-dev python3-dev \
      build-essential ccache

    pip install cython==0.29.33 buildozer

      - name: Build
        run: "buildozer android debug 2>&1"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sims4translator-apk
          path: bin/*.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.${{ github.run_number }}
          name: "Sims 4 Translator v1.4.${{ github.run_number }}"
          body: |
            Traducao de mods .package do The Sims 4.
            Instale o .apk abaixo (ative Fontes desconhecidas antes).
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev python3-dev \
            build-essential ccache
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: "Sims 4 Translator v1.0"
          body: |
            ## Sims 4 Translator — App para Android
            
            Traduza mods .package do The Sims 4 direto pelo celular.
            
            ### Como instalar
            1. Baixe o arquivo `.apk` abaixo
            2. No Android, vá em Configurações → Segurança → ative **Fontes desconhecidas**
            3. Abra o `.apk` baixado e instale
            
            ---
            Baseado no projeto original de [voky1](https://github.com/voky1/sims4-translator) · Licença MIT  
            Interface mobile por AlucardYummy
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sims4translator-apk
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.${{ github.run_number }}
          name: "Sims 4 Translator v1.4.${{ github.run_number }}"
          body: |
            ## Sims 4 Translator — App Android
            Traducao de mods .package do The Sims 4 direto pelo celular.

            ### Como instalar
            1. Baixe o `.apk` abaixo
            2. Android: Configuracoes > Seguranca > Fontes desconhecidas
            3. Abra e instale

            Baseado em voky1/sims4-translator (MIT)
            Interface mobile por AlucardYummy
          files: ${{ steps.buildozer.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
